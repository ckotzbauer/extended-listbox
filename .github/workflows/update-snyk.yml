name: update-snyk

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch: {}

jobs:
  update-snyk:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-scan-snyk.yml@9e2a560f6c957fe29a2a78f8cbadabeea56a8c73 # 0.52.0
    with:
      install-node: true
      scan-commands: snyk monitor
    secrets:
      token: ${{ secrets.SNYK_TOKEN }}
